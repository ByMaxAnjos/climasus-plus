name: build-windows-beta

# DRAFT — Windows beta build for climasus+. Runs entirely on a windows-latest runner
# (cross-building this from macOS is not possible; see docs/releases/github-release-publish.md).
# Trigger manually from the Actions tab. Expect the R-install step to need iteration on the
# first runs (INLA + a few heavy geospatial packages are the usual failure points).

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Also create a GitHub pre-release with the installer"
        type: boolean
        default: false
      tag:
        description: "Release tag (only used when publish=true)"
        default: "v0.1.0-beta-windows"

# the publish step creates a GitHub release, which the default GITHUB_TOKEN can't do without this
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # matches the R version the macOS bundle was built against (memory: R 4.5.1)
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - uses: dtolnay/rust-toolchain@stable

      # WebView2 ships with Windows Server 2022 runners; no extra install needed.

      - name: Install R package closure (complete, explicit)
        shell: Rscript {0}
        run: |
          # Windows R + libcurl (schannel) fails the TLS certificate REVOCATION check for the
          # INLA server (NTNU, no OCSP/CRL reachable from the runner) and reports it as the
          # opaque "cannot open URL" — same symptom on both PACKAGES indexes. Disable best-effort
          # revocation so the HTTPS fetch succeeds; force libcurl + a generous timeout too.
          Sys.setenv(R_LIBCURL_SSL_REVOKE_BEST_EFFORT = "TRUE")
          options(timeout = 600, download.file.method = "libcurl")
          install.packages("pak", type = "binary")
          source("scripts/r-packages.R")
          # INLA lives in its own repo and pak's solver doesn't discover it via options(repos)
          # (the runner also forces a Posit PPM mirror on top). Install it the documented way,
          # with base install.packages and the INLA repo passed explicitly. dep=TRUE pulls INLA's
          # hard deps (Matrix, sp, fmesher) from CRAN/PPM.
          inla_repo <- "https://inla.r-inla-download.org/R/stable"
          for (attempt in 1:3) {
            try(install.packages("INLA", repos = c(getOption("repos"), INLA = inla_repo), dep = TRUE))
            if ("INLA" %in% rownames(installed.packages())) break
            message("INLA install attempt ", attempt, " failed; retrying in 10s...")
            Sys.sleep(10)
          }
          if (!("INLA" %in% rownames(installed.packages()))) {
            # last resort: install the binary .zip directly (bypasses the repo index resolution)
            win <- sprintf("%s/bin/windows/contrib/%s.%s", inla_repo, R.version$major, strsplit(R.version$minor, ".", fixed = TRUE)[[1]][1])
            idx <- read.dcf(url(file.path(win, "PACKAGES")))
            rows <- idx[idx[, "Package"] == "INLA", , drop = FALSE]
            ver <- tail(sort(rows[, "Version"]), 1)
            zip <- file.path(tempdir(), sprintf("INLA_%s.zip", ver))
            download.file(sprintf("%s/INLA_%s.zip", win, ver), zip, mode = "wb")
            # deps first (from CRAN/PPM), then INLA from the local zip
            install.packages(c("Matrix", "sp", "fmesher"))
            install.packages(zip, repos = NULL, type = "win.binary")
          }
          if (!("INLA" %in% rownames(installed.packages()))) stop("INLA could not be installed from ", inla_repo)
          # Everything else via pak: GitHub-only packages by "owner/repo" ref, the rest by name.
          cran_pkgs <- setdiff(CLIMASUS_USED, c(CLIMASUS_BASE_PKGS, names(CLIMASUS_GITHUB_PKGS), "INLA"))
          pak::pak(c(unname(CLIMASUS_GITHUB_PKGS), cran_pkgs, "rmarkdown"))
          # fail early, in CI, if anything is still missing (mirrors bundle-r-windows.R's check)
          need <- setdiff(CLIMASUS_USED, rownames(installed.packages()))
          if (length(need)) stop("Missing after install: ", paste(need, collapse = ", "))
          cat("All", length(CLIMASUS_USED), "required packages present.\n")

      - name: Install JS deps
        run: npm ci

      # NOTE: beforeBuildCommand ("npm run build") runs `tsc -b` first. The 3 pre-existing
      # errors in src/ui/result/ResultActions.tsx MUST be fixed or this step fails. See the
      # project notes — they blocked `npm run build` before this workflow existed.
      - name: Bundle R into resources/
        shell: cmd
        run: Rscript scripts/bundle-r-windows.R

      - name: Tauri build (NSIS installer)
        run: npx -y @tauri-apps/cli@^2 build --bundles nsis

      - name: Compute checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower() + "  " + $exe.Name |
            Out-File -Encoding ascii SHA256SUMS-windows.txt
          Get-Content SHA256SUMS-windows.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: climasus-plus-windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            SHA256SUMS-windows.txt
          if-no-files-found: error

      - name: Publish pre-release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          gh release create "${{ inputs.tag }}" `
            --title "climasus+ ${{ inputs.tag }}" `
            --prerelease `
            --notes "Beta Windows do climasus+ (build de CI). Instalador NSIS gerado automaticamente. Assinatura ausente — o SmartScreen do Windows pode avisar na primeira execucao." `
            "$($exe.FullName)#$($exe.Name)" `
            "SHA256SUMS-windows.txt#SHA256SUMS-windows.txt"
